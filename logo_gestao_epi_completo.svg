<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <!-- Logotipo completo Gestão_EPI -->
  
  <!-- Fundo azul escuro profissional -->
  <rect width="600" height="180" fill="#2C3E50" rx="8"/>
  
  <defs>
    <style>
      .helmet-outline { fill: white; stroke: #1a252f; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .helmet-detail { fill: none; stroke: #1a252f; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .logo-text { fill: white; font-family: 'Roboto', 'Arial', sans-serif; font-weight: 700; }
      .logo-text-light { fill: white; font-family: 'Roboto', 'Arial', sans-serif; font-weight: 300; }
    </style>
  </defs>
  
  <!-- Grupo do ícone do capacete (centralizado verticalmente à esquerda) -->
  <g transform="translate(40, 20) scale(0.7)">
    <!-- Corpo principal do capacete (cúpula) -->
    <path class="helmet-outline" d="M 100 40 
      C 60 40, 40 65, 35 95
      L 35 110
      L 165 110
      L 165 95
      C 160 65, 140 40, 100 40 Z"/>
    
    <!-- Crista central no topo -->
    <rect class="helmet-outline" x="92" y="30" width="16" height="35" rx="4"/>
    
    <!-- Suporte lateral esquerdo -->
    <path class="helmet-detail" d="M 60 50 L 55 65"/>
    <circle class="helmet-outline" cx="55" cy="68" r="3"/>
    
    <!-- Suporte lateral direito -->
    <path class="helmet-detail" d="M 140 50 L 145 65"/>
    <circle class="helmet-outline" cx="145" cy="68" r="3"/>
    
    <!-- Aba inferior -->
    <ellipse class="helmet-outline" cx="100" cy="110" rx="75" ry="12"/>
    
    <!-- Suporte quadrado esquerdo na aba -->
    <rect class="helmet-outline" x="28" y="106" width="12" height="8" rx="1"/>
    
    <!-- Suporte quadrado direito na aba -->
    <rect class="helmet-outline" x="160" y="106" width="12" height="8" rx="1"/>
    
    <!-- Linha horizontal de ventilação/detalhe na aba -->
    <line class="helmet-detail" x1="85" y1="115" x2="115" y2="115"/>
    
    <!-- Linha de suporte horizontal inferior -->
    <path class="helmet-outline" d="M 40 118 
      L 50 122
      L 150 122
      L 160 118"/>
      
    <!-- Detalhes de ajuste interno -->
    <line class="helmet-detail" x1="70" y1="100" x2="70" y2="110" opacity="0.5"/>
    <line class="helmet-detail" x1="130" y1="100" x2="130" y2="110" opacity="0.5"/>
  </g>
  
  <!-- Texto "Gestão_EPI" -->
  <text x="190" y="105" class="logo-text" font-size="54">Gestão_EPI</text>
  
  <!-- Linha decorativa sutil abaixo do texto -->
  <line x1="190" y1="120" x2="560" y2="120" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- Subtítulo opcional -->
  <text x="190" y="145" class="logo-text-light" font-size="18" opacity="0.8">Sistema de Gerenciamento de EPIs</text>
</svg>
